<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICA Supply LTD. | Global Sourcing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A192F; /* 深色科技蓝 */
            --accent: #0070F3;  /* 现代亮蓝 */
            --bg: #F8FAFC;
            --text: #334155;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); }
        
        /* 核心变量：全局导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #E2E8F0;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 600; 
            transition: color 0.3s; 
        }
        .nav-links a:hover { color: var(--accent); }
        .nav-cta {
            background: var(--accent);
            color: white !important;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
        }

        /* 首页大图区域 */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #112240 100%);
            color: white;
            padding: 100px 5%;
            text-align: center;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; letter-spacing: -1px; }
        .hero p { font-size: 1.2rem; color: #94A3B8; max-width: 600px; margin: 0 auto 2rem; }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">MICA Supply.</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="nav-cta">Request Quote</a>
        </div>
    </nav>

    <section class="hero">
        <h1>High-Performance Hardware Sourcing</h1>
        <p>Connecting North America and China with enterprise-grade electronic components, AI accelerators, and server infrastructure.</p>
        <a href="products.html" class="btn">View Product Catalog</a>
    </section>

</body>
</html>
